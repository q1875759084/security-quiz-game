# ==================== 版本1：本地开发学习用 ====================
# 场景：本地同时跑 Nginx + mock-server.js（node mock-server.js）
# Nginx 监听 80，mock 服务跑在 3001
# 访问 http://localhost/api/questions → Nginx 转发到 localhost:3001/questions
#
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 反向代理：/api/ 开头的请求转发到本地 mock 服务
    # proxy_pass 末尾有斜杠：/api/questions → http://localhost:3001/questions（去掉 /api 前缀）
    location /api/ {
        proxy_pass http://localhost:3001/;

        # 把真实客户端 IP 透传给后端（否则后端只能看到 127.0.0.1）
        proxy_set_header X-Real-IP $remote_addr;

        # 透传原始 Host，后端可以知道用户访问的域名
        proxy_set_header Host $host;
    }

    # SPA 路由兜底：找不到文件一律返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # JS/CSS 带 hash，长期强缓存
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML 不缓存，每次协商
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}


