server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ==================== 反向代理：API 请求转发到后端服务 ====================
    #
    # 【方案A - 当前使用】后端跑在宿主机，Nginx 跑在 Docker 容器内
    #
    # 为什么不能用 localhost：
    #   容器内的 localhost 指容器自身，不是宿主机
    #   用 localhost:3001 找的是容器内部的 3001 端口，那里什么都没有
    #
    # 172.17.0.1 是 Docker 默认网桥（docker0）在宿主机侧的 IP
    #   容器 → 172.17.0.1:3001 → 宿主机上的 Express/Node 服务
    #
    # 【方案B - Docker Compose 多容器编排时替换】
    #   前端容器和后端容器同属一个 Compose 网络，可以用服务名互相访问
    #   proxy_pass http://backend:3001/;
    #   其中 backend 是 docker-compose.yml 里后端服务的 service 名称
    #   Docker 内置 DNS 会把服务名解析为对应容器的 IP，无需手动维护 IP
    #
    # proxy_pass 末尾斜杠的含义：
    #   有斜杠：/api/questions → http://后端/questions（去掉 /api 前缀）
    #   无斜杠：/api/questions → http://后端/api/questions（保留完整 path）
    #
    location /api/ {
        proxy_pass http://172.17.0.1:3001/;

        # 透传真实客户端 IP
        # 不加这行，后端只能看到 Nginx 的 IP（127.0.0.1 或容器 IP）
        proxy_set_header X-Real-IP $remote_addr;

        # 透传用户请求的原始 Host（域名或 IP）
        # 不加这行，后端收到的 Host 是 proxy_pass 的目标地址
        proxy_set_header Host $host;
    }

    # ==================== SPA 路由兜底 ====================
    #
    # 问题：用户直接在地址栏输入 /about，浏览器向服务器发起 GET /about
    #       服务器磁盘上没有 /about 这个文件，默认会 404
    #
    # try_files 按顺序尝试：
    #   $uri     → 按 path 直接找文件（/about → 磁盘找 /about，不存在）
    #   $uri/    → 把 path 当目录找 index 文件（不存在）
    #   /index.html → 兜底，发起内部子请求 /index.html
    #                 子请求命中下方 location = /index.html 块
    #                 返回 index.html，React Router 接管，渲染 /about 对应的组件
    #
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==================== 静态资源：长期强缓存 ====================
    #
    # 适用范围：Webpack 构建产物（文件名带 contenthash，如 bundle.abc123.js）
    # 缓存策略：max-age=31536000（1年）+ immutable
    #
    # immutable 的含义：告诉浏览器此文件内容在缓存期间绝对不变
    #   强制刷新（Ctrl+F5）时也不发请求
    #   之所以能承诺"绝对不变"：内容变了 hash 就变了，URL 就变了，旧 URL 永远不会更新
    #
    # 注意：只对带 hash 的资源设置长期缓存
    #   不带 hash 的资源（如 logo.png）不应设置长期缓存，否则更新后用户拿到旧版本
    #
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ==================== index.html：协商缓存 ====================
    #
    # 为什么 HTML 不能强缓存：
    #   index.html 是 SPA 的入口，它的 <script src> 引用了带 hash 的 JS 文件
    #   如果 HTML 被强缓存，用户拿到旧 HTML → 旧 HTML 里的 JS 引用还是旧 hash
    #   → 即使部署了新版本，用户也看不到更新
    #
    # no-cache 的含义：不是"不缓存"，是"每次使用前必须向服务器协商"
    #   浏览器会带 ETag/If-None-Match 问服务器"文件有没有变"
    #   没变 → 304，用本地缓存，不重新下载（节省带宽）
    #   有变 → 200，下载新文件
    #
    # 为什么单独用一个 location 块而不放在 location / 里：
    #   职责分离：location / 只负责 SPA 路由兜底，这个块只负责缓存策略
    #   直接访问 /index.html 和经由 try_files 兜底的请求，最终都会命中这个块
    #
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
