name: CI/CD 自动部署

# 触发条件说明：
#   push 任意分支   → 触发 CI（尽早发现问题）
#   workflow_dispatch → 手动触发，执行 CD 到测试环境
#   push tag v*.*.* → CI + CD 到生产环境
#
# 镜像管理策略（核心）：
#   一次构建原则：测试和生产使用同一个镜像产物，只有 tag 不同
#   - 测试：构建镜像，推 sha tag，部署到测试环境验证
#   - 生产：不重新构建，给已有的 sha 镜像追加语义版本 tag，部署到生产
#   这样保证"测试通过的"和"上线的"是同一个二进制产物
on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ==================== CI：代码校验 ====================
  # push 分支和 push tag 都触发，workflow_dispatch 时不自动触发
  # deploy-prod 通过 needs: ci 强制依赖，保证生产发布前必须通过校验
  ci:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Node 版本
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: Lint 校验
        run: npm run lint

      - name: 构建校验
        run: npm run build

  # ==================== CD：测试环境部署 ====================
  # 触发：workflow_dispatch（开发者主动决定"这个版本可以给 QA 看了"）
  # 镜像：构建 + 推 sha tag（sha 不可变，精确对应这次 commit）
  # 不推 latest：latest 语义模糊，多环境场景下容易引发混乱
  deploy-dev:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      # CI 校验（workflow_dispatch 不触发 ci job，在此补充）
      - name: 设置 Node 版本
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: Lint 校验
        run: npm run lint

      - name: 构建校验
        run: npm run build

      - name: 生成镜像标签
        id: meta
        run: echo "SHA_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: 构建 Docker 镜像
        run: docker build -t security-quiz-game:${{ steps.meta.outputs.SHA_TAG }} .

      - name: 登录 Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: 推送镜像到 Docker Hub（sha tag）
        run: |
          docker tag security-quiz-game:${{ steps.meta.outputs.SHA_TAG }} ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.SHA_TAG }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.SHA_TAG }}

      - name: 触发 infra 仓库部署前端（测试环境）
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: ${{ github.repository_owner }}/infra
          event-type: deploy-frontend
          client-payload: |
            {
              "image_tag": "${{ steps.meta.outputs.SHA_TAG }}",
              "environment": "dev"
            }

  # ==================== CD：生产环境部署 ====================
  # 触发：push tag v*.*.*（人工打 tag = 确认测试通过可以发布）
  # 镜像：不重新构建，给测试阶段的 sha 镜像追加语义版本 tag
  #   docker buildx imagetools create 是纯 manifest 操作，不重新构建
  #   保证生产部署的镜像和测试验证的镜像是同一个产物
  deploy-prod:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: 生成镜像标签
        id: meta
        run: |
          echo "VERSION_TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "SHA_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: 登录 Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      # 不重新构建，给已有的 sha 镜像追加语义版本 tag
      # 前提：测试环境部署时已推送过 sha tag 的镜像
      - name: 给 sha 镜像追加语义版本 tag
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.VERSION_TAG }} \
            ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.SHA_TAG }}

      - name: 触发 infra 仓库部署前端（生产环境）
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: ${{ github.repository_owner }}/infra
          event-type: deploy-frontend
          client-payload: |
            {
              "image_tag": "${{ steps.meta.outputs.VERSION_TAG }}",
              "environment": "prod"
            }
