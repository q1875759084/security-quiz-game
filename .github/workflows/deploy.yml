name: CI/CD 自动部署

# 触发条件：push 到 main 分支
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # GitHub 提供的虚拟机

    steps:
      # Step 1: 拉取代码到虚拟机
      - name: Checkout 代码
        uses: actions/checkout@v3

      # Step 2: 在虚拟机上构建 Docker 镜像（多阶段构建）
      - name: 构建 Docker 镜像
        run: docker build -t security-quiz-game:latest .

      # Step 3: 登录 Docker Hub，推送镜像
      - name: 登录 Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: 推送镜像到 Docker Hub
        run: |
          docker tag security-quiz-game:latest ${{ secrets.DOCKER_USERNAME }}/security-quiz-game:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/security-quiz-game:latest

      # Step 4: SSH 登录腾讯云服务器，拉取新镜像并重启容器
      - name: 部署到云服务器
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}      # 服务器 IP
          username: ${{ secrets.SERVER_USER }}  # 登录用户名
          key: ${{ secrets.SERVER_SSH_KEY }}    # SSH 私钥
          script: |
            # 拉取最新镜像
            docker pull ${{ secrets.DOCKER_USERNAME }}/security-quiz-game:latest
            # 停止并删除旧容器（首次部署时容器不存在，|| true 避免报错退出）
            docker stop security-quiz-game || true
            docker rm security-quiz-game || true
            # 启动新容器，映射 80 端口
            docker run -d \
              --name security-quiz-game \
              --restart always \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/security-quiz-game:latest
