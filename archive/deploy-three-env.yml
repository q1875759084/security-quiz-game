name: CI/CD 三套环境完整方案（归档参考）

# ==================== 三套环境模型说明 ====================
#
# 开发/测试环境（dev）：
#   用途：开发联调 + QA 测试，同一套环境
#   触发：手动触发（workflow_dispatch），开发者主动决定"这个版本可以给 QA 测了"
#   服务器：dev 服务器（独立于生产）
#
# 生产环境（prod）：
#   用途：线上用户访问
#   触发：push tag v*.*.*，人工打 tag = 确认测试通过可以发布
#   服务器：prod 服务器
#
# main 分支的含义：
#   main = 已通过测试、准备发布或已发布的代码
#   merge 到 main 不触发任何部署，只是代码的"合并主线"
#   部署生产用打 tag，不用 push main
#
# 完整研发流程：
#   1. feature 分支开发
#   2. 手动触发 workflow_dispatch → 部署到 dev 环境 → 联调自测
#   3. QA 在 dev 环境测试
#   4. 测试通过 → PR → merge 到 main
#   5. 打 tag v*.*.* → 自动触发生产部署
#
# 所需 Secrets（仓库 Settings → Secrets → Actions）：
#   DOCKER_HUB_USERNAME / DOCKER_HUB_TOKEN
#   DEV_SERVER_HOST / DEV_SERVER_USER / DEV_SERVER_SSH_KEY
#   PROD_SERVER_HOST / PROD_SERVER_USER / PROD_SERVER_SSH_KEY

on:
  push:
    branches:
      - '**'        # 任意分支 push → 触发 CI
    tags:
      - 'v*.*.*'    # tag push → 触发生产部署
  workflow_dispatch:  # 手动触发 → 触发开发/测试环境部署

jobs:
  # ==================== CI：代码校验 ====================
  # 任意 push（分支或 tag）都跑
  # workflow_dispatch 手动触发时不自动跑（不同触发类型），手动触发前应确认 CI 已通过
  ci:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Node 版本
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: Lint 校验
        run: npm run lint

      - name: 构建校验
        run: npm run build

  # ==================== CD：开发/测试环境部署 ====================
  # 触发：手动触发（GitHub Actions 页面点击 Run workflow，选择目标分支）
  # 场景：开发完成自测，准备让 QA 介入；或 QA 发现 bug 修完后重新部署
  deploy-dev:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 生成镜像标签
        id: meta
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: 构建 Docker 镜像
        run: docker build -t security-quiz-game:${{ steps.meta.outputs.IMAGE_TAG }} .

      - name: 登录 Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: 推送镜像到 Docker Hub
        run: |
          docker tag security-quiz-game:${{ steps.meta.outputs.IMAGE_TAG }} ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.IMAGE_TAG }}

      - name: 部署到开发/测试服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script_stop: true
          script: |
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.IMAGE_TAG }}
            docker stop security-quiz-game || true
            docker rm security-quiz-game || true
            docker run -d \
              --name security-quiz-game \
              --restart always \
              -p 80:80 \
              ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.IMAGE_TAG }}

  # ==================== CD：生产环境部署 ====================
  # 触发：push tag v*.*.*（如 git tag v1.0.0 && git push origin v1.0.0）
  # 打 tag = 人工确认"测试通过，可以上生产"
  # 镜像同时打三个 tag：version（语义）+ sha（精确回滚）+ latest（快速引用）
  deploy-prod:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 生成镜像标签
        id: meta
        run: |
          echo "VERSION_TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "SHA_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: 构建 Docker 镜像
        run: docker build -t security-quiz-game:${{ steps.meta.outputs.SHA_TAG }} .

      - name: 登录 Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: 推送镜像到 Docker Hub
        run: |
          docker tag security-quiz-game:${{ steps.meta.outputs.SHA_TAG }} ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.VERSION_TAG }}
          docker tag security-quiz-game:${{ steps.meta.outputs.SHA_TAG }} ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.SHA_TAG }}
          docker tag security-quiz-game:${{ steps.meta.outputs.SHA_TAG }} ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.VERSION_TAG }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.SHA_TAG }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:latest

      - name: 部署到生产服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script_stop: true
          script: |
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.VERSION_TAG }}
            docker stop security-quiz-game || true
            docker rm security-quiz-game || true
            docker run -d \
              --name security-quiz-game \
              --restart always \
              -p 80:80 \
              ${{ secrets.DOCKER_HUB_USERNAME }}/security-quiz-game:${{ steps.meta.outputs.VERSION_TAG }}
